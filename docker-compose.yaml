services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: vodle
      POSTGRES_PASSWORD: vodle
      POSTGRES_DB: vodle
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vodle -d vodle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - UV_LINK_MODE=copy
      - UV_PYTHON=/usr/local/bin/python3
      - DATABASE_URL=postgresql://vodle:vodle@postgres:5432/vodle

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=development

volumes:
  backend-venv:
